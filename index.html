<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="mVbrLsdyz076PAzXi4CUYURN5gsYti1DatIL098FeVs" />

    <title>موقع ذاكر | بإشراف علي ناصر</title>
    
    <meta name="description" content="موقع ذاكر بإشراف علي ناصر: المصحف الكامل 114 سورة. اقرأ سورة البقرة، الكهف، يس، الملك، الإخلاص وجميع السور مع الأذكار.">
    <meta name="keywords" content="القرآن الكريم كاملاً, 114 سورة, علي ناصر, أذكار الصباح والمساء, سورة الإخلاص, سورة الكافرون, القراءة المباشرة">

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --main-green: #1a5d1a; --light-green: #2ecc71; --gold: #D4AF37; --bg-color: #f4f7f4; }
        body { background-color: var(--bg-color); font-family: 'Amiri', serif; margin: 0; direction: rtl; }

        /* الهيدر */
        .header { background: var(--main-green); color: white; padding: 10px 20px; display: flex; align-items: center; position: fixed; width: 100%; top: 0; z-index: 1000; height: 60px; box-sizing: border-box; }
        .menu-btn { font-size: 30px; cursor: pointer; background: none; border: none; color: white; margin-left: 15px; }

        /* القائمة الجانبية يمين */
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0 !important; background-color: #1a1a1a; overflow-x: hidden; transition: 0.4s; padding-top: 60px; }
        .sidenav a { padding: 15px 25px; text-decoration: none; font-size: 1.5rem; color: #bbb; display: block; text-align: right; border-bottom: 1px solid #222; }
        .sidenav a:hover { background: #222; color: var(--light-green); padding-right: 35px; }
        .close-btn { position: absolute; top: 10px; left: 20px; font-size: 36px; color: #888; cursor: pointer; }

        /* الخانات والأنيميشن */
        .container { padding-top: 80px; max-width: 800px; margin: auto; }
        .section { display: none; text-align: center; animation: fadeIn 0.5s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-card { 
            background: var(--main-green); color: white; padding: 20px; border-radius: 15px; 
            font-size: 1.5rem; cursor: pointer; transition: 0.3s; width: 90%; margin: 15px auto; border: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .nav-card:hover { transform: translateY(-5px); background: var(--light-green); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .nav-card:active { transform: scale(0.95); }

        /* شبكة السور (114 سورة) */
        .surah-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 10px; }
        .surah-item { background: white; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; border: 1px solid #ddd; }
        .surah-item:hover { background: var(--gold); color: white; transform: scale(1.05); }

        .quran-text { font-size: 2rem; line-height: 2.5; text-align: center; padding: 20px; }
        .dhikr-item { background: white; padding: 20px; margin: 10px; border-right: 5px solid var(--main-green); font-size: 1.6rem; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <button class="menu-btn" onclick="openNav()">☰</button>
        <div style="flex-grow:1; text-align:center; font-family:'Reem Kufi'; font-size:1.2rem;">موقع ذاكر</div>
    </div>

    <div id="mySidenav" class="sidenav">
        <span class="close-btn" onclick="closeNav()">&times;</span>
        <a onclick="showSection('home')">● الرئيسية</a>
        <a onclick="showSection('quran')">● القرآن الكريم (كامل)</a>
        <a onclick="showSection('azkar')">● الأذكار</a>
        <a onclick="showSection('subha')">● خاتم التسبيح</a>
        <a onclick="showSection('contact')">● التواصل</a>
    </div>

    <div class="container">
        <div id="home" class="section active">
            <h1 style="color:var(--main-green); font-family:'Reem Kufi';">بإشراف علي ناصر</h1>
            <button class="nav-card" onclick="showSection('quran')"> القرآن الكريم كاملاً</button>
            <button class="nav-card" onclick="showSection('azkar')"> الأذكار</button>
            <button class="nav-card" onclick="showSection('subha')"> خاتم التسبيح</button>
        </div>

        <div id="quran" class="section">
            <div style="background:white; padding:20px; border-radius:20px;">
                <h2 class="bismillah"</h2>
                <div id="surah-list" class="surah-grid">جارِ تحميل المصحف...</div>
            </div>
        </div>

        <div id="surah-view" class="section">
            <div style="background:white; padding:20px; border-radius:20px;">
                <button onclick="showSection('quran')" style="float:right; border:none; padding:10px; border-radius:5px; cursor:pointer;">← رجوع</button>
                <h2 id="surah-title" style="color:var(--main-green);"></h2>
                <div id="quran-content" class="quran-text"></div>
            </div>
        </div>

        <div id="azkar" class="section">
            <button class="nav-card" onclick="loadAzkar('morning')">☀️ أذكار الصباح</button>
            <button class="nav-card" onclick="loadAzkar('evening')">🌙 أذكار المساء</button>
            <div id="azkar-content"></div>
        </div>

        <div id="subha" class="section">
            <div id="counter" style="font-size:5rem; color:var(--main-green);">0</div>
            <button class="nav-card" style="width:150px; height:150px; border-radius:50%; margin:auto;" onclick="countUp()">سبّح</button>
        </div>

        <div id="contact" class="section">
            <a href="https://www.instagram.com/7uv0_/" target="_blank" class="nav-card" style="background:#E1306C">Inst</a>
        </div>
    </div>

    <script>
        function openNav() { document.getElementById("mySidenav").style.width = "280px"; }
        function closeNav() { document.getElementById("mySidenav").style.width = "0"; }
        
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            closeNav();
            window.scrollTo(0,0);
        }

        // أمر جلب الـ 114 سورة تلقائياً
        fetch('https://api.alquran.cloud/v1/surah')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('surah-list');
                list.innerHTML = "";
                data.data.forEach(surah => {
                    const div = document.createElement('div');
                    div.className = 'surah-item';
                    div.textContent = surah.name;
                    div.onclick = () => {
                        showSection('surah-view');
                        document.getElementById('surah-title').textContent = surah.name;
                        document.getElementById('quran-content').textContent = "جارِ تحميل الآيات...";
                        fetch(`https://api.alquran.cloud/v1/surah/${surah.number}`)
                            .then(r => r.json())
                            .then(d => {
                                document.getElementById('quran-content').textContent = d.data.ayahs.map(a => a.text + ` ﴿${a.numberInSurah}﴾`).join(" ");
                            });
                    };
                    list.appendChild(div);
                });
            });

        let c = 0;
        function countUp() { c++; document.getElementById('counter').textContent = c; }
        
        function loadAzkar(t) {
            const b = document.getElementById('azkar-content');
            let txt = t === 'morning' ? ["أصبحنا وأصبح الملك لله", "يا حي يا قيوم"] : ["أمسينا وأمسى الملك لله", "اللهم بك أمسينا"];
            b.innerHTML = txt.map(z => `<div class="dhikr-item">${z}</div>`).join("");
        }
    </script>
</body>
</html>
